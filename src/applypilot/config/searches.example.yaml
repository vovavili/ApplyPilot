# ApplyPilot search configuration
# Copy to ~/.applypilot/searches.yaml and customize for your job search.
# The wizard (applypilot init) generates a basic version automatically.

# Search queries -- each has a query string and priority tier.
# Tier 1: High-priority exact matches (searched first, highest precision)
# Tier 2: Strong matches, broader scope
# Tier 3: Wide net, high volume, lower precision
queries:
  - query: "software engineer"
    tier: 1
  - query: "backend engineer"
    tier: 1
  - query: "backend developer"
    tier: 1
  - query: "full stack developer"
    tier: 2
  - query: "full stack engineer"
    tier: 2
  - query: "python developer"
    tier: 2
  - query: "python engineer"
    tier: 2
  - query: "DevOps engineer"
    tier: 2
  - query: "site reliability engineer"
    tier: 2
  - query: "platform engineer"
    tier: 2
  - query: "cloud engineer"
    tier: 2
  - query: "data engineer"
    tier: 2
  - query: "infrastructure engineer"
    tier: 2
  - query: "software developer"
    tier: 3
  - query: "developer"
    tier: 3
  - query: "systems engineer"
    tier: 3
  - query: "automation engineer"
    tier: 3
  - query: "solutions engineer"
    tier: 3
  - query: "integration engineer"
    tier: 3
  - query: "ML engineer"
    tier: 3
  - query: "machine learning engineer"
    tier: 3
  - query: "AI engineer"
    tier: 3
  - query: "security engineer"
    tier: 3

# Locations to search
locations:
  - location: "San Francisco, CA"
    remote: false
  - location: "Remote"
    remote: true

# Location filtering -- accept/reject patterns for job location text
location:
  accept_patterns:
    - "San Francisco"
    - "Bay Area"
    - "SF"
    - "California"
    - "CA"
    - "Remote"
    - "Anywhere"
    - "United States"
    - "US"
    - "USA"
  reject_patterns:
    - "New York only"
    - "Seattle only"
    - "onsite only"
    - "London, UK"
    - "India"
    - "Philippines"

# Country for Indeed/LinkedIn/Google Jobs searches
country: "USA"

# JobSpy source boards (all available options shown)
boards:
  - indeed
  - linkedin
  - glassdoor
  - zip_recruiter
  - google

# Workday direct ATS discovery. Keep broad crawling off unless you really
# want to search every packaged Workday employer.
workday_enabled: true
workday_allow_broad_crawl: false
workday_location_filter: true
workday_location_policy: recall_first
workday_max_tier: 2
workday_employers: []

# Optional train-time gate for Dutch hybrid or on-site roles. Remote/EU/EMEA
# roles are handled before this check. Unknown Dutch cities are kept for
# review instead of auto-apply.
location_train_policy:
  enabled: true
  max_minutes: 100
  unknown_city: manual_review
  anchors:
    - station: Den Haag Centraal
      code: GVC
    - station: Rotterdam Centraal
      code: RTD
  source:
    static_table: true
    ns_api_fallback: true
    cache_path: C:\Users\latvi\.applypilot\train_commute_cache.json
    max_api_lookups_per_run: 10

# Curated high-value company career pages. Empty allowlist means skip.
priority_company_sources_enabled: true
priority_company_max_tier: 3
priority_company_location_policy: recall_first
priority_company_sources:
  - uber
  - netflix
  - stripe
  - flow_traders
  - jump_trading
  - imc
  - catawiki
  - bol
  - adyen
  - elastic
  - gitlab
  - databricks
  - flexport
  - spotify
  - kyndryl
  - vanderlande

# Search defaults
defaults:
  results_per_site: 100  # Max results per board per query
  hours_old: 72          # Only jobs posted within this many hours

# Negative keywords -- skip jobs with these in the title (case-insensitive)
exclude_titles:
  - "senior director"
  - "VP "
  - "vice president"
  - "chief"
  - "intern"
  - "internship"
  - "co-op"
  - "clearance required"
  - "TS/SCI"
  - "principal scientist"
